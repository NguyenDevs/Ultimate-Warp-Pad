name: UltimateWarpPad
version: '1.0-SNAPSHOT'
main: org.nguyendevs.ultimateWarpPad.UltimateWarpPad
api-version: '1.21'
load: POSTWORLD

depend: [WorldGuard]
softdepend: [Vault]

commands:
  wpa:
    description: Admin Warp Pad commands
    usage: /wpa <reload|create|delete|setting>
    permission: uwp.admin
  wpp:
    description: Player Warp Pad commands
    usage: /wpp <create|delete|setting|trust>

permissions:
  uwp.use:
    description: Use any warp pad
    default: true
  uwp.admin:
    description: Admin warp commands
    default: op
  uwp.user.create:
    description: Create personal warps
    default: true
  uwp.user.delete:
    description: Delete personal warps
    default: true
  uwp.user.setting:
    description: Open warp settings
    default: true
  uwp.user.trust:
    description: Trust other players on your warps
    default: true
