      lore:
        - " "
        - "&8Go back to warp selection."
        - " "
        - "&a▸ Click to return."
    close_button:
      name: "&c✕ Close"
      lore:
        - " "
        - "&8Close the settings menu."
        - " "
        - "&a▸ Click to close."

  icon_selection:
    title: "<gradient:#55FFFF:#FFFFFF>Select Icon</gradient>"
    page_previous: "&7← Previous"
    page_next: "&7Next →"
    return_button:
      name: "&7← Return"
      lore:
        - " "
        - "&8Go back to warp settings."
        - " "
        - "&a▸ Click to return."

